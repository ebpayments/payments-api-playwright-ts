name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://sandbox.payments-demo.local' }}
          API_TOKEN: ${{ secrets.API_TOKEN || 'sandbox_test_token' }}
          MERCHANT_ID: ${{ secrets.MERCHANT_ID || 'merchant_test_001' }}

      - name: Run UI tests
        run: npm run test:ui
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://sandbox.payments-demo.local' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
